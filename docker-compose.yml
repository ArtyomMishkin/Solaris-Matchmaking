services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: solaris_matchmaking
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d solaris_matchmaking"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/solaris_matchmaking?sslmode=disable
      JWT_SECRET: solaris-docker-dev-secret
      LOG_LEVEL: info
      LOG_FORMAT: text
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  seed:
    build: .
    entrypoint: ["/usr/local/bin/seed"]
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/solaris_matchmaking?sslmode=disable
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
